version: 2
updates:
  - package-ecosystem: "gradle"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    reviewers:
      - "wolfsbane9513"
    labels:
      - "dependencies"
      - "security"
    groups:
      compose:
        patterns:
          - "androidx.compose*"
      security:
        patterns:
          - "androidx.security*"
          - "androidx.biometric*"
      testing:
        patterns:
          - "junit*"
          - "androidx.test*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "ci/cd"
      - "dependencies"
